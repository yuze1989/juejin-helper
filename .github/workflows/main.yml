name: Juejin Auto Checkin

on:
  schedule:
    # 定时任务：每天北京时间早晨 9:05 运行 (UTC 1:05)
    - cron: '5 1 * * *'
  workflow_dispatch: # 支持手动点击运行

jobs:
  checkin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Run Sign Script
        env:
          # 将刚才配置的 Secret 注入到环境变量中
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: npm install && node index.js
