name: Juejin Auto Sign
on:
  schedule:
    # 每天北京时间早晨 8:30 运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许手动点按钮测试运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node.js
        run: npm install axios
      - name: Run Script
        env:
          JUEJIN_COOKIE: ${{ secrets.JUEJIN_COOKIE }}
        run: node index.js
